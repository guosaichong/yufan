<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../static/images/ABUIABAFGAAghr3-1gUoqLWW5wcwEDgQ.ico" type="image/x-icon">
    <link rel="stylesheet" type="text/css" href="../static/common.css">

    <script src="../static/jquery-3.3.1.min.js"></script>
    <script src="../static/common.js"></script>
    <title>{% block title %}{% endblock %}</title>
    {% block head %}{% endblock %}
</head>

<body>
    <div class="header">
        <div class="left">
            <img src="../static/images/ABUIABAEGAAgrumH1QUo6PDxxwYwvAU4rgE.png" alt="禹帆物流">
            <span>专业第三方物流供应商</span>
        </div>

        <div class="address">
            <p>天津市宁河区一汽大众华北基地</p>

            <span>服务热线：022-69329006 69329008</span>
        </div>
        <p class="user">welcome&nbsp;
            {%if current_user.username%}
            {{current_user.username}}&nbsp;&nbsp;<a href="{{url_for('logout')}}">退出</a></p>
        {%else%}
        &nbsp;&nbsp;<a href="{{url_for('login')}}">请登录</a></p>
        {%endif%}
        <div class="scroll-box">

            <ul>
                <li><span id="nowDateTimeSpan"></span></li>
                <li><span id="nowDateTimeSpan"></span></li>

            </ul>
        </div>
    </div>
    <div class="navigator">

    </div>
    {% block content %}{% endblock %}
</body>

</html>
