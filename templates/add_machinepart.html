{% extends "view_base.html" %}
{% block title %}零部件管理{% endblock %}
{% block view %}
<div>
    <p><a href="{{url_for('machinepart')}}">零部件管理</a>>添加零部件</p>
    <form action="{{url_for('add_machinepart')}}" method="POST">
        <label for="supplier">所属供应商号：</label>
        <select name="supplier" id="supplier" required>
            {%for s in suppliers%}
            <option value="{{s.supplier_number}}">{{s.supplier_number}}</option>
            {%endfor%}
        </select><br>
        <label for="part_number">零部件号：</label>
        <input type="text" id="part_number" name="part_number" required autocomplete="off">
        <label for="part_name">零部件名称：</label>
        <input type="text" id="part_name" name="part_name" required autocomplete="off">
        <label for="amount">零部件数量：</label>
        <input type="text" id="amount" name="amount" required autocomplete="off" value="0">
        <label for="quantifier">零部件单位：</label>
        <input type="text" id="quantifier" name="quantifier" required autocomplete="off">

        <button type="submit">添加</button>
        {%for message in get_flashed_messages()%}
        <p style="color: red">{{message}}</p>
        {%endfor%}
    </form>
</div>
{%endblock%}
